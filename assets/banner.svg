<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="RagChatBot, GraphRAG">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="ac" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="360" rx="18" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="1197" height="357" rx="17" fill="none" stroke="#a78bfa" stroke-opacity="0.25" stroke-width="3"/>

  <!-- title block -->
  <rect x="64" y="74" width="56" height="10" rx="5" fill="url(#ac)"/>
  <text x="64" y="146" font-family="Helvetica, Arial, sans-serif" font-size="64" font-weight="700" fill="#f8fafc">RagChatBot</text>
  <text x="64" y="196" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="600" fill="#a78bfa">GraphRAG</text>
  <text x="64" y="232" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#cbd5e1">a knowledge graph linked into every answer</text>
  <rect x="64" y="258" width="165.0" height="34" rx="17" fill="#f8fafc" fill-opacity="0.08" stroke="#a78bfa" stroke-opacity="0.5"/>
  <text x="146.5" y="281" font-family="ui-monospace, Menlo, monospace" font-size="17" fill="#c4b5fd" text-anchor="middle">rag-graph-2024</text>

  <!-- year badge -->
  <rect x="1066" y="34" width="70" height="32" rx="16" fill="#a78bfa" fill-opacity="0.16" stroke="#a78bfa" stroke-opacity="0.55"/>
  <text x="1101" y="56" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="600" fill="#c4b5fd" text-anchor="middle">2024</text>

  <!-- motif -->
  
  <g stroke-linecap="round">
    <line x1="760" y1="150" x2="880" y2="110" stroke="#a78bfa" stroke-width="3" opacity="0.5"/>
    <line x1="760" y1="150" x2="860" y2="220" stroke="url(#ac)" stroke-width="5"/>
    <line x1="880" y1="110" x2="1000" y2="150" stroke="#a78bfa" stroke-width="3" opacity="0.5"/>
    <line x1="860" y1="220" x2="1000" y2="150" stroke="url(#ac)" stroke-width="5"/>
    <line x1="860" y1="220" x2="960" y2="272" stroke="#a78bfa" stroke-width="3" opacity="0.5"/>
    <line x1="1000" y1="150" x2="1105" y2="205" stroke="url(#ac)" stroke-width="5"/>
    <circle cx="760" cy="150" r="17" fill="#1e1b4b" stroke="#a78bfa" stroke-width="4"/>
    <circle cx="880" cy="110" r="13" fill="#1e1b4b" stroke="#a78bfa" stroke-width="3" opacity="0.7"/>
    <circle cx="860" cy="220" r="17" fill="#a78bfa" stroke="#c4b5fd" stroke-width="4"/>
    <circle cx="1000" cy="150" r="17" fill="#a78bfa" stroke="#c4b5fd" stroke-width="4"/>
    <circle cx="960" cy="272" r="12" fill="#1e1b4b" stroke="#a78bfa" stroke-width="3" opacity="0.7"/>
    <circle cx="1105" cy="205" r="19" fill="url(#ac)"/>
    <text x="792" y="128" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#cbd5e1">subject</text>
    <text x="880" y="252" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#cbd5e1">predicate</text>
    <text x="1032" y="132" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#cbd5e1">object</text>
  </g>

  <!-- corner credit -->
  <text x="1160" y="334" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#94a3b8" text-anchor="end">by <tspan fill="#c4b5fd">MlvPtL</tspan></text>
</svg>
